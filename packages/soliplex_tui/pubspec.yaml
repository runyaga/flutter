name: soliplex_tui
description: Rich terminal UI for Soliplex AI backend, built on nocterm.
version: 0.1.0-dev
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  args: ^2.5.0
  glob: ^2.1.0
  nocterm: ^0.5.0
  signals_core: ^6.2.0
  soliplex_agent:
    path: ../soliplex_agent
  soliplex_client:
    path: ../soliplex_client
  soliplex_logging:
    path: ../soliplex_logging

dev_dependencies:
  mocktail: ^1.0.0
  test: ^1.25.0
  very_good_analysis: ^10.0.0
