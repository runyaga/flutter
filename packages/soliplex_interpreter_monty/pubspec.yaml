name: soliplex_interpreter_monty
description: Bridge Monty sandboxed Python interpreter into Soliplex (pure Dart).
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  dart_monty:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
  dart_monty_bridge:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
      path: packages/dart_monty_bridge
  meta: ^1.11.0

dependency_overrides:
  dart_monty_ffi:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
      path: packages/dart_monty_ffi
  dart_monty_platform_interface:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
      path: packages/dart_monty_platform_interface
  dart_monty_wasm:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
      path: packages/dart_monty_wasm
  struct_log:
    git:
      url: https://github.com/runyaga/struct_log.git

dev_dependencies:
  dart_monty_platform_interface:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
      path: packages/dart_monty_platform_interface
  mocktail: ^1.0.4
  test: ^1.24.0
  very_good_analysis: ^10.0.0

