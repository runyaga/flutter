# =============================================================================
# DCM Configuration — Strict
# =============================================================================
# Rules sourced from soliplex_interpreter_monty (most mature package config).
# Metrics tightened from Stage 1 relaxed values.
# Documentation: https://dcm.dev/docs/configuration
# =============================================================================

dcm:
  # ---------------------------------------------------------------------------
  # Metrics Thresholds
  # ---------------------------------------------------------------------------
  metrics:
    cyclomatic-complexity:
      threshold: 15
    lines-of-code:
      threshold: 50
    number-of-parameters:
      threshold: 5
    maximum-nesting-level:
      threshold: 4

  # ---------------------------------------------------------------------------
  # Exclusions
  # ---------------------------------------------------------------------------
  exclude:
    metrics:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
      - "build/**"
      - "packages/soliplex_client/lib/src/schema/**"
      - "test/**"
    rules:
      - "**/*.g.dart"
      - "**/*.freezed.dart"

  # ---------------------------------------------------------------------------
  # Rules
  # ---------------------------------------------------------------------------

  rules:
    # --- Anti-Patterns ---
    - avoid-unused-parameters
    - avoid-nested-conditional-expressions
    - avoid-missing-enum-constant-in-map
    - avoid-unnecessary-type-assertions
    - avoid-unnecessary-type-casts
    - avoid-unrelated-type-assertions
    - avoid-redundant-async
    - avoid-duplicate-exports
    - avoid-collection-methods-with-unrelated-types
    - avoid-passing-async-when-sync-expected
    - avoid-collapsible-if
    - avoid-redundant-else
    - avoid-incomplete-copy-with
    - avoid-self-compare
    - avoid-self-assignment
    - avoid-unnecessary-nullable-return-type
    - avoid-unrelated-type-casts

    # --- Style & Formatting ---
    - prefer-match-file-name:
        exclude:
          - "test/**"
    - prefer-immediate-return
    - prefer-commenting-analyzer-ignores
    - prefer-conditional-expressions
    - prefer-trailing-comma
    - prefer-moving-to-variable:
        exclude:
          - "test/**"
    - prefer-correct-identifier-length
    - prefer-declaring-const-constructor
    - prefer-first
    - prefer-last
    - newline-before-return
    - no-boolean-literal-compare
    - no-empty-block
    - no-equal-then-else
    - binary-expression-operand-order
    - double-literal-format

    # --- Null Safety & Types ---
    - avoid-late-keyword:
        exclude:
          - "test/**"
    - avoid-dynamic:
        exclude:
          - "test/**"
    - avoid-non-null-assertion:
        exclude:
          - "test/**"

    # --- Member Ordering ---
    - member-ordering:
        exclude:
          - "lib/**/widgets/**"
          - "lib/features/**"
        order:
          - constructors
          - public-fields
          - private-fields
          - get-setters
          - public-methods
          - private-methods
          - overridden-methods

    # --- Testing ---
    - prefer-test-matcher
    - prefer-correct-test-file-name
